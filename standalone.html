<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リズトレカレンダー</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCO4HcceGbMowW3O27a52NcslEuz-H1jdA",
            authDomain: "rizutore-6adb2.firebaseapp.com",
            projectId: "rizutore-6adb2",
            storageBucket: "rizutore-6adb2.firebasestorage.app",
            messagingSenderId: "787141528970",
            appId: "1:787141528970:web:87c073d27fee57206d4c73",
            measurementId: "G-EWLQHZ42FN"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // Simple Welcome Screen Component
        function App() {
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState('');
            
            useEffect(() => {
                // Test Firebase connection
                db.collection('students').limit(1).get()
                    .then(snapshot => {
                        setMessage(`Firebase接続成功！ドキュメント数: ${snapshot.size}`);
                        setLoading(false);
                    })
                    .catch(error => {
                        setMessage(`エラー: ${error.message}`);
                        setLoading(false);
                    });
            }, []);
            
            if (loading) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-100">
                        <div className="text-xl text-slate-500">読み込み中...</div>
                    </div>
                );
            }
            
            return (
                <div className="flex h-screen items-center justify-center bg-slate-100">
                    <div className="bg-white p-8 rounded-xl shadow-xl max-w-md">
                        <div className="flex justify-center mb-6">
                            <div className="bg-blue-100 p-4 rounded-full">
                                <svg className="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                        </div>
                        <h1 className="text-2xl font-bold text-slate-800 mb-2 text-center">リズトレカレンダー</h1>
                        <p className="text-slate-500 mb-6 text-center">レッスン日程・出欠共有アプリ</p>
                        <div className="p-4 bg-green-50 border border-green-200 rounded-lg">
                            <p className="text-sm text-green-800">{message}</p>
                        </div>
                        <div className="mt-4 text-xs text-slate-400 text-center">
                            GitHub: fkt78/RZT-SCH-APP
                        </div>
                    </div>
                </div>
            );
        }
        
        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
